name: ci

on: [ push, pull_request ]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        services:
            docker:
                image: docker:dind
                options: --privileged
        steps:
            -   uses: actions/checkout@v2

            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v2
                with:
                    python-version: ${{ matrix.python-version }}

            -   name: update package manager & install python3 environment
                run: |
                    pip install poetry
                    poetry install

            -   name: continuous integration process
                run: poetry run alfred ci

            -   name: collect log on failure
                if: failure()
                uses: jwalton/gh-docker-logs@v1


            -   name: Afficher logs docker:dind en détail
                if: failure()
                run: |
                    echo "=== DOCKER:DIND DÉTAILLÉ ==="
                    docker logs --tail 500 -t ${{ job.services.docker.id }} || true
